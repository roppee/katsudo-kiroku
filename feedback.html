<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アプリへのご意見</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.25rem 4rem;
  }

  .page {
    width: 100%;
    max-width: 440px;
  }

  .header {
    margin-bottom: 3rem;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 600;
    color: #1a1a18;
    letter-spacing: -0.02em;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .header p {
    font-size: 14px;
    color: #888780;
    line-height: 1.6;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #b4b2a9;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .section {
    margin-bottom: 2.5rem;
  }

  .card {
    background: #ffffff;
    border: 1px solid #e8e6e0;
    border-radius: 16px;
    padding: 1.25rem 1.25rem 1.25rem 1rem;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    text-decoration: none;
  }

  .card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    border-color: #d3d1c7;
  }

  .card:active {
    transform: translateY(0);
    box-shadow: none;
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-green { background: #e1f5ee; }
  .icon-purple { background: #eeedfe; }
  .icon-gray { background: #f1efe8; }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a18;
    margin-bottom: 3px;
  }

  .card-desc {
    font-size: 13px;
    color: #888780;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 5px;
    margin-top: 6px;
  }

  .badge-anon {
    background: #f1efe8;
    color: #888780;
  }

  .badge-open {
    background: #e1f5ee;
    color: #0f6e56;
  }

  .badge-closed {
    background: #f1efe8;
    color: #b4b2a9;
  }

  .card-arrow {
    color: #d3d1c7;
    font-size: 20px;
    flex-shrink: 0;
  }

  .card.disabled {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }

  .divider {
    border: none;
    border-top: 1px solid #e8e6e0;
    margin: 2rem 0;
  }

  .footer {
    font-size: 12px;
    color: #b4b2a9;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>アプリへのご意見</h1>
    <p>使いにくい点や改善の希望を気軽に教えてください。<br>回答はすべて匿名で収集されます。</p>
  </div>

  <div class="section">
    <div class="section-label">改善提案</div>
    <a class="card" href="https://forms.gle/6biZZFe264yPk28s8" target="_blank">
      <div class="card-icon icon-green">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f6e56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">改善提案を送る</div>
        <div class="card-desc">使いにくい点・あったらいい機能など</div>
        <span class="badge badge-anon">匿名</span>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>

  <div class="section">
    <div class="section-label">優先度アンケート</div>
    <!-- アンケート実施中：href を差し替えて disabled クラスを外す -->
    <a class="card disabled" href="#" id="vote-card">
      <div class="card-icon icon-purple">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#534ab7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">どの改善を優先してほしいか投票する</div>
        <div class="card-desc">集まった提案の中から選べます</div>
        <span class="badge badge-closed">現在は実施していません</span>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>

  <hr class="divider">
  <p class="footer">
    いただいた意見は開発の参考にします
  </p>

</div>
</body>
</html>
